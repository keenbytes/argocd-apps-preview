name: Pull Request

on:
  pull_request_target:
    branches:
      - "main"
jobs:
  gen-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download app-of-apps diff preview
        env:
          APP_OF_APPS_VERSION: 0.1.0
          APP_OF_APPS_ARCH: linux_amd64
        run: |
          APP_OF_APPS_URL=https://github.com/mikolajgasior/argocd-app-of-apps-diff-preview/releases/download/v${APP_OF_APPS_VERSION}/argocd-app-of-apps-diff-preview_${APP_OF_APPS_VERSION}_${APP_OF_APPS_ARCH}.zip \
          
          wget $APP_OF_APPS_URL -O app-of-apps.zip
          unzip app-of-apps.zip -x "LICENSE"
          rm app-of-apps.zip
          mv ./app-of-apps-dump /usr/local/bin/app-of-apps-dump
          mv ./app-of-apps-diff /usr/local/bin/app-of-apps-diff
          chmod +x /usr/local/bin/app-of-apps*

      - name: Create outputs directories
        env:
          BRANCH_NAME: ${{github.head_ref}}
        run: |
          rm -rf outputs*
          mkdir outputs-{main,diff}
          mkdir outputs-${{env.BRANCH_NAME}}

      - name: Install dependencies
        run: |
          # Install kind
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          chmod +x ./kind
          mv ./kind /usr/local/bin/kind

          # Install argocd CLI
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/download/v3.0.3/argocd-linux-amd64
          chmod +x argocd-linux-amd64
          mv ./argocd-linux-amd64 /usr/local/bin/argocd

      - name: Dump applications from main
        run: |
          app-of-apps-dump --manifests ./manifests --output-apps ./outputs-main/ \
            --replace-repo-url https://github.com/mikolajgasior/argocd-app-of-apps-diff-preview \
            --replace-target-revision main

      - name: Dump applications from branch
        env:
          BRANCH_NAME: ${{github.head_ref}}
        run: |
          app-of-apps-dump --manifests ./manifests --output-apps ./outputs-${{env.BRANCH_NAME}}/ \
            --replace-repo-url https://github.com/mikolajgasior/argocd-app-of-apps-diff-preview \
            --replace-target-revision ${{env.BRANCH_NAME}}

      - name: Generate diff
        env:
          BRANCH_NAME: ${{github.head_ref}}
        run: |
          app-of-apps-diff \
            --apps-base ./outputs-main/ \ 
            --apps-target ./outputs-${{env.BRANCH_NAME}}/ \ 
            --output-diff ./outputs-diff/

      - name: Upload diff
        uses: actions/upload-artifact@v4
        with:
          name: diff
          path: outputs-diff/
