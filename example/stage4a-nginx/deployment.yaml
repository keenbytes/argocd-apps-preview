apiVersion: apps/v1
kind: Deployment
metadata:
  name: stage4a-nginx
  labels:
    app: stage4a-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stage4a-nginx
  template:
    metadata:
      labels:
        app: stage4a-nginx
        someLabel: example-1
        andOneMore: example-1
        otherLabel: example-1
        anotherLabel: example-1
        andOneMoreAgain: example-1
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
