apiVersion: apps/v1
kind: Deployment
metadata:
  name: stage3-1-nginx
  labels:
    app: stage3-1-nginx
    someLabel: example-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stage3-1-nginx
  template:
    metadata:
      labels:
        app: stage3-1-nginx
        otherLabel: example-1
        andOneMore: example-1
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
