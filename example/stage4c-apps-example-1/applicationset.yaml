apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: stage5b-apps-example-1
  namespace: tools
spec:
  generators:
    - git:
        repoURL: https://github.com/mikolajgasior/argocd-app-of-apps-diff-preview
        revision: main
        directories:
          - path: example/stage5b-1-nginx-example-1
  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: stage5
      source:
        repoURL: https://github.com/mikolajgasior/argocd-app-of-apps-diff-preview
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: tools
      syncPolicy:
        automated: {}
