apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stage2-apps
  namespace: tools
spec:
  project: stage2
  source:
    repoURL: https://github.com/mikolajgasior/argocd-app-of-apps-diff-preview
    targetRevision: main
    path: example/stage2-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: tools
  syncPolicy:
    automated: {}
