apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: stage3-apps
  namespace: tools
spec:
  generators:
    - git:
        repoURL: https://github.com/keenbytes/argocd-apps-preview
        revision: main
        directories:
          - path: example/stage3-1-nginx
          - path: example/stage3-2-nginx
          - path: example/stage3-3-app
          - path: example/stage3-4-app
  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: stage3
      source:
        repoURL: https://github.com/keenbytes/argocd-apps-preview
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: tools
      syncPolicy:
        automated: {}
